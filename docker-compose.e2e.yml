services:
  home-database:
    image: mongo
    command: ["mongod", "--quiet"]
    ports:
      - "27017:27017"
  mock-server:
    build:
      context: .
      dockerfile: mock-server/Dockerfile
    environment:
      - PORT=3004
    ports:
      - "3004:3004"
  home-backend:
    build:
      context: .
      dockerfile: server/Dockerfile.dev
    environment:
      - PORT=3001
      - DATABASE_URL=mongodb://home-database:27017/home_e2e
      - NODE_ENV=development
      - DRIME_URL=http://mock-server:3004
      - DRIME_TOKEN=mock-token
      - DRIME_EMAIL=mock@test.com
      - DRIME_PASS=mock-pass
      - DADATA_URL=http://mock-server:3004
      - DADATA_API_KEY=mock-key
      - NOMINATIM_URL=http://mock-server:3004
      - ACCESS_TOKEN_SECRET=641cd63c198fa8a94b4404aabd882432869c10fc9e955291e482a02c08e1c5bd23fa53b01459cc4c94f6eddb931a86ec31afc0c28d1feab855d69d4c950dbceb
      - REFRESH_TOKEN_SECRET=0b6d2e7c19beb9acccb483d9e4f016d37573907007d518720f4d56a6501e865d64ba1ad20eceaf7df868f1b446256f1648845a03c9cc81d9e20b2bf19398a3b5
      - E2E_LOGIN=shevdi
      - E2E_PASSWORD=pass
      - RATE_LIMIT_LOGIN_MAX=50
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      - home-database
      - mock-server
    develop:
      watch:
        - action: sync
          path: ./server
          target: /app
          ignore:
            - node_modules/
        - action: rebuild
          path: ./server/package.json
        - action: rebuild
          path: ./server/package-lock.json
  home-frontend:
    build:
      context: .
      dockerfile: client/Dockerfile.e2e
      args:
        BACKEND_URL: http://home-backend:3001/api/v1
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    depends_on:
      home-backend:
        condition: service_healthy
  e2e:
    build:
      context: .
      dockerfile: e2e/Dockerfile
    volumes:
      - ./e2e/allure-results:/app/e2e/allure-results
      - ./e2e/test-results:/app/e2e/test-results
    environment:
      - E2E_BASE_URL=http://home-frontend:3000
      - E2E_API_URL=http://home-backend:3001/api/v1
      - E2E_MOCK_URL=http://mock-server:3004
      - E2E_LOGIN=shevdi
      - E2E_PASSWORD=pass
    depends_on:
      home-frontend:
        condition: service_healthy
    ipc: host
    init: true
    profiles:
      - test
