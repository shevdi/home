# Build context is the repository root (Amvera "Code" folder). The Dockerfile uses
# paths like client/ and ui-kit/ relative to that root — not relative to client/ alone.
meta:
  environment: docker
  toolchain:
    name: docker
build:
  dockerfile: client/Dockerfile
  skip: false
run:
  image: null
  command: null
  args: null
  persistenceMount: /data
  containerPort: "80"
  servicePort: "80"
