name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Agent debug log (context)
        env:
          TAG: ${{ github.ref_name }}
        run: node scripts/agent-release-debug.mjs context

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test --workspace=client --workspace=server

      - name: Start E2E stack
        run: docker compose -f docker-compose.e2e.yml up -d --build

      - name: Wait for services
        run: |
          timeout 120 bash -c 'until curl -s http://localhost:3000 > /dev/null; do sleep 2; done' || exit 1

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests with Allure
        run: npm run e2e

      - name: Tear down E2E stack
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

      - name: Create release directory
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p docs/releases/${TAG}

      - name: Generate Allure report
        run: |
          TAG="${{ github.ref_name }}"
          cd e2e && npx allure generate allure-results --clean -o ../docs/releases/${TAG}/allure-report

      - name: Create release notes
        run: |
          TAG="${{ github.ref_name }}"
          DATE=$(date -u +%Y-%m-%d)
          cat > docs/releases/${TAG}/release-notes.md << EOF
          # Release ${TAG}

          **Date:** ${DATE}

          ## Summary

          Release ${TAG}.

          ## E2E Test Results

          [Allure report](./allure-report/) – screenshots, videos, and test timeline.
          EOF

      - name: Agent debug log (postdocs)
        env:
          TAG: ${{ github.ref_name }}
        run: node scripts/agent-release-debug.mjs postdocs

      - name: Update CHANGELOG
        env:
          TAG: ${{ github.ref_name }}
        run: |
          node -e "
          const fs = require('fs');
          const tag = process.env.TAG;
          const version = tag.replace(/^v/, '');
          const date = new Date().toISOString().slice(0, 10);
          const entry = '\n## [' + version + '] - ' + date + '\n\n### Added\n- Release ' + tag + '\n\n';
          const c = fs.readFileSync('docs/CHANGELOG.md', 'utf8');
          const idx = c.indexOf('## [Unreleased]');
          const next = c.indexOf('\n## ', idx + 1);
          const insertAt = next === -1 ? c.length : next;
          fs.writeFileSync('docs/CHANGELOG.md', c.slice(0, insertAt) + entry + c.slice(insertAt));
          "

      - name: Update package.json version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          export VERSION="${TAG#v}"
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = process.env.VERSION;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Commit and push docs
        run: |
          set -e
          TAG="${{ github.ref_name }}"
          export TAG
          RELEASE_BRANCH="release/${TAG#v}"
          # #region agent log
          node scripts/agent-release-debug.mjs probe || true
          # #endregion
          cp -r docs docs-backup
          cp package.json package.json-backup
          git fetch origin main "$RELEASE_BRANCH"
          # #region agent log
          node scripts/agent-release-debug.mjs after-fetch || true
          # #endregion
          git checkout -f main
          git merge "origin/$RELEASE_BRANCH" -m "Merge $RELEASE_BRANCH into main (release $TAG)"
          # #region agent log
          node scripts/agent-release-debug.mjs after-merge || true
          # #endregion
          rm -rf docs
          mv docs-backup docs
          mv package.json-backup package.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ package.json
          git diff --staged --quiet || git commit -m "docs: add release ${TAG} [skip ci]"
          git push origin HEAD:main
          # #region agent log
          node scripts/agent-release-debug.mjs after-push || true
          # #endregion

      - name: Upload agent debug log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-87ff80-log
          path: debug-87ff80.log
          if-no-files-found: warn
