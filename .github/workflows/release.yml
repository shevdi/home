name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test --workspace=client --workspace=server

      - name: Start E2E stack
        run: docker compose -f docker-compose.e2e.yml up -d --build

      - name: Wait for services
        run: |
          timeout 120 bash -c 'until curl -s http://localhost:3000 > /dev/null; do sleep 2; done' || exit 1

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests with Allure
        run: npm run e2e

      - name: Tear down E2E stack
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

      - name: Create release directory
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p docs/releases/${TAG}

      - name: Generate Allure report
        run: |
          TAG="${{ github.ref_name }}"
          cd e2e && npx allure generate allure-results --clean -o ../docs/releases/${TAG}/allure-report

      - name: Create release notes
        run: |
          TAG="${{ github.ref_name }}"
          DATE=$(date -u +%Y-%m-%d)
          cat > docs/releases/${TAG}/release-notes.md << EOF
          # Release ${TAG}

          **Date:** ${DATE}

          ## Summary

          Release ${TAG}. See [Allure report](./allure-report/) for E2E test results.
          EOF

      - name: Update CHANGELOG
        env:
          TAG: ${{ github.ref_name }}
        run: |
          node -e "
          const fs = require('fs');
          const tag = process.env.TAG;
          const version = tag.replace(/^v/, '');
          const date = new Date().toISOString().slice(0, 10);
          const entry = '\n## [' + version + '] - ' + date + '\n\n### Added\n- Release ' + tag + '\n\n';
          const c = fs.readFileSync('docs/CHANGELOG.md', 'utf8');
          const idx = c.indexOf('## [Unreleased]');
          const next = c.indexOf('\n## ', idx + 1);
          const insertAt = next === -1 ? c.length : next;
          fs.writeFileSync('docs/CHANGELOG.md', c.slice(0, insertAt) + entry + c.slice(insertAt));
          "

      - name: Commit and push docs
        run: |
          TAG="${{ github.ref_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "docs: add release ${TAG} [skip ci]"
          git push origin HEAD:main
