name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build ui-kit
        run: npm run build:ui-kit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test --workspace=client --workspace=server

      - name: Run E2E tests
        run: docker compose -f docker-compose.e2e.yml --profile test up --build --exit-code-from e2e

      - name: Tear down E2E stack
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
