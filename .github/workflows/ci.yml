name: CI

on:
  push:
    branches: [main, ci-test]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test --workspace=client --workspace=server

      - name: Start E2E stack
        run: docker compose -f docker-compose.e2e.yml up -d --build

      - name: Wait for services
        run: |
          timeout 120 bash -c 'until curl -s http://localhost:3000 > /dev/null; do sleep 2; done' || exit 1

      - name: Run E2E tests
        run: npm run e2e

      - name: Tear down E2E stack
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
